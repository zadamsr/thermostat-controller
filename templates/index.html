<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermostat Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .thermostat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status {
            font-size: 14px;
            color: #a0a0a0;
        }

        .temperature-display {
            text-align: center;
            margin: 40px 0;
        }

        .current-temp {
            font-size: 80px;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .temp-label {
            font-size: 16px;
            color: #a0a0a0;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .mode-btn.active.heat {
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
        }

        .mode-btn.active.cool {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }

        .temperature-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-label {
            font-size: 14px;
            color: #a0a0a0;
            min-width: 80px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .temp-value {
            font-size: 36px;
            font-weight: 500;
            min-width: 80px;
            text-align: center;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #a0a0a0;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .thermostat-card {
                padding: 30px 20px;
            }

            .current-temp {
                font-size: 60px;
            }

            .mode-selector {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="thermostat-card">
            <div class="header">
                <h1>Thermostat Control</h1>
                <div class="status" id="status">Loading...</div>
            </div>

            <div id="error" class="error hidden"></div>

            <div id="loading" class="loading">
                <p>Loading thermostat data...</p>
            </div>

            <div id="content" class="hidden">
                <div class="temperature-display">
                    <div class="current-temp" id="currentTemp">--</div>
                    <div class="temp-label">Current Temperature</div>
                </div>

                <div class="mode-selector">
                    <button class="mode-btn heat" data-mode="Heat">Heat</button>
                    <button class="mode-btn cool" data-mode="Cool">Cool</button>
                    <button class="mode-btn" data-mode="Off">Off</button>
                </div>

                <div class="temperature-control" id="heatControl">
                    <div class="control-label">Heat to</div>
                    <div class="control-buttons">
                        <button class="control-btn" onclick="adjustTemp('heat', -1)">−</button>
                        <div class="temp-value" id="heatSetpoint">--</div>
                        <button class="control-btn" onclick="adjustTemp('heat', 1)">+</button>
                    </div>
                </div>

                <div class="temperature-control hidden" id="coolControl">
                    <div class="control-label">Cool to</div>
                    <div class="control-buttons">
                        <button class="control-btn" onclick="adjustTemp('cool', -1)">−</button>
                        <div class="temp-value" id="coolSetpoint">--</div>
                        <button class="control-btn" onclick="adjustTemp('cool', 1)">+</button>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Outdoor</div>
                        <div class="info-value" id="outdoorTemp">--°F</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Mode</div>
                        <div class="info-value" id="modeDisplay">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let thermostatData = {};
        let updateTimeout;

        // Fetch current status
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) throw new Error('Failed to fetch status');

                thermostatData = await response.json();
                updateUI();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('error').classList.add('hidden');
                document.getElementById('status').textContent = 'Connected';
            } catch (error) {
                showError('Failed to connect to thermostat: ' + error.message);
                document.getElementById('status').textContent = 'Disconnected';
            }
        }

        // Update UI with current data
        function updateUI() {
            document.getElementById('currentTemp').textContent = thermostatData.indoor_temperature + '°';
            document.getElementById('heatSetpoint').textContent = thermostatData.heat_setpoint + '°';
            document.getElementById('coolSetpoint').textContent = thermostatData.cool_setpoint + '°';
            document.getElementById('outdoorTemp').textContent = (thermostatData.outdoor_temperature || '--') + '°F';
            document.getElementById('modeDisplay').textContent = thermostatData.mode;

            const restrictions = thermostatData.guest_restrictions;

            // Show/hide mode selector based on restrictions
            const modeSelector = document.querySelector('.mode-selector');
            if (restrictions && !restrictions.allow_mode_change) {
                modeSelector.classList.add('hidden');
            } else {
                modeSelector.classList.remove('hidden');

                // Update mode buttons
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('active');

                    // Hide modes that aren't allowed
                    if (restrictions && !restrictions.allowed_modes.includes(btn.dataset.mode)) {
                        btn.style.display = 'none';
                    } else {
                        btn.style.display = '';
                    }

                    if (btn.dataset.mode === thermostatData.mode) {
                        btn.classList.add('active');
                    }
                });
            }

            // Show/hide controls based on mode
            const heatControl = document.getElementById('heatControl');
            const coolControl = document.getElementById('coolControl');

            if (thermostatData.mode === 'Heat') {
                heatControl.classList.remove('hidden');
                coolControl.classList.add('hidden');
            } else if (thermostatData.mode === 'Cool') {
                heatControl.classList.add('hidden');
                coolControl.classList.remove('hidden');
            } else if (thermostatData.mode === 'Auto') {
                heatControl.classList.remove('hidden');
                coolControl.classList.remove('hidden');
            } else {
                heatControl.classList.add('hidden');
                coolControl.classList.add('hidden');
            }
        }

        // Adjust temperature
        function adjustTemp(type, delta) {
            const restrictions = thermostatData.guest_restrictions;

            if (type === 'heat') {
                const newTemp = thermostatData.heat_setpoint + delta;
                const minTemp = restrictions ? restrictions.min_heat : thermostatData.min_heat;
                const maxTemp = restrictions ? restrictions.max_heat : thermostatData.max_heat;

                if (newTemp >= minTemp && newTemp <= maxTemp) {
                    thermostatData.heat_setpoint = newTemp;
                }
            } else if (type === 'cool') {
                const newTemp = thermostatData.cool_setpoint + delta;
                const minTemp = restrictions ? restrictions.min_cool : thermostatData.min_cool;
                const maxTemp = restrictions ? restrictions.max_cool : thermostatData.max_cool;

                if (newTemp >= minTemp && newTemp <= maxTemp) {
                    thermostatData.cool_setpoint = newTemp;
                }
            }

            updateUI();
            scheduleUpdate();
        }

        // Change mode
        function setMode(mode) {
            thermostatData.mode = mode;
            updateUI();
            scheduleUpdate();
        }

        // Schedule update to API (debounced)
        function scheduleUpdate() {
            clearTimeout(updateTimeout);
            document.getElementById('status').textContent = 'Updating...';

            updateTimeout = setTimeout(async () => {
                try {
                    const response = await fetch('/api/set_temperature', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            mode: thermostatData.mode,
                            heat_setpoint: thermostatData.heat_setpoint,
                            cool_setpoint: thermostatData.cool_setpoint,
                            device_id: thermostatData.device_id,
                            location_id: thermostatData.location_id
                        })
                    });

                    if (!response.ok) throw new Error('Failed to update thermostat');

                    document.getElementById('status').textContent = 'Updated';
                    setTimeout(() => {
                        document.getElementById('status').textContent = 'Connected';
                    }, 2000);
                } catch (error) {
                    showError('Failed to update: ' + error.message);
                    document.getElementById('status').textContent = 'Update failed';
                }
            }, 1000);
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');

            setTimeout(() => {
                errorEl.classList.add('hidden');
            }, 5000);
        }

        // Mode button handlers
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });

        // Initial fetch
        fetchStatus();

        // Refresh status every 30 seconds
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
